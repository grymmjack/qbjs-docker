name: QBJS Reusable Build

# Drop-in workflow: from one .bas file, produce a web bundle (+ GitHub Pages),
# native Tauri installers (Win/macOS/Linux), and native NW.js packages, and
# attach everything to a GitHub Release when you push a version tag.

on:
  workflow_call:
    inputs:
      source-file:
        description: 'Path to the .bas source file (relative to repo root)'
        required: true
        type: string
      project-name:
        description: 'App name (title, PWA manifest, artifact names)'
        required: true
        type: string
      mode:
        description: 'Loader style: auto or play'
        required: false
        default: 'auto'
        type: string
      qbjs-ref:
        description: 'QBJS git ref to build with'
        required: false
        default: 'main'
        type: string
      deploy-pages:
        description: 'Deploy the web bundle to GitHub Pages'
        required: false
        default: true
        type: boolean
      build-tauri:
        description: 'Build native Tauri installers (Win/macOS/Linux)'
        required: false
        default: true
        type: boolean
      build-nwjs:
        description: 'Build native NW.js packages (Win/macOS/Linux)'
        required: false
        default: true
        type: boolean
      nwjs-version:
        description: 'NW.js runtime version for the NW.js packages'
        required: false
        default: '0.95.0'
        type: string
      tauri-identifier:
        description: 'Reverse-domain app id for Tauri bundles'
        required: false
        default: ''
        type: string

env:
  QBJS_IMAGE: ghcr.io/grymmjack/qbjs-docker:${{ inputs.qbjs-ref }}
  TOOLS_REPO: grymmjack/qbjs-docker

jobs:
  # ------------------------------------------------------------------ web ----
  web:
    name: Web bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      # Needed to pull the (possibly private) toolchain image from GHCR.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build web bundle (Docker)
        run: |
          # Prefer the published image; fall back to building from THIS checkout
          # (works when the caller repo is the toolchain repo itself, and avoids
          # needing git auth for a private remote).
          if ! docker pull "$QBJS_IMAGE"; then
            if [ -f Dockerfile ]; then
              echo "Image unavailable; building from local checkout..."
              docker build --build-arg QBJS_REF=${{ inputs.qbjs-ref }} -t "$QBJS_IMAGE" .
            else
              echo "::error::Cannot pull $QBJS_IMAGE and no local Dockerfile. Make the qbjs-docker package public, or grant this repo package read access."
              exit 1
            fi
          fi
          docker run --rm -v "$(pwd):/workspace" --user "$(id -u):$(id -g)" \
            "$QBJS_IMAGE" build "${{ inputs.source-file }}" \
              --name "${{ inputs.project-name }}" \
              --mode "${{ inputs.mode }}" --out dist

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project-name }}-web
          path: dist

      - name: Upload Pages artifact
        if: inputs.deploy-pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ---------------------------------------------------------------- pages ----
  pages:
    name: Deploy to GitHub Pages
    needs: web
    if: inputs.deploy-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4

  # ---------------------------------------------------------------- tauri ----
  tauri:
    name: Tauri (${{ matrix.rid }})
    needs: web
    if: inputs.build-tauri
    strategy:
      fail-fast: false
      matrix:
        include:
          # native x64 builds
          - { os: ubuntu-22.04,     rid: linux-x64,       target: '',                      runner: '',         deps: linux, rust-targets: '',                                          optional: false }
          - { os: windows-latest,   rid: windows-x64,     target: '',                      runner: '',         deps: none,  rust-targets: '',                                          optional: false }
          # macOS: ONE universal .dmg for both Intel + Apple Silicon
          - { os: macos-latest,     rid: macos-universal, target: universal-apple-darwin,  runner: '',         deps: mac,   rust-targets: 'x86_64-apple-darwin,aarch64-apple-darwin',  optional: false }
          # native ARM64 Linux (needs an ARM runner: free on public repos, paid on private)
          - { os: ubuntu-24.04-arm, rid: linux-arm64,     target: '',                      runner: '',         deps: linux, rust-targets: '',                                          optional: true }
          # Windows ARM64, cross-compiled from Linux via cargo-xwin
          - { os: ubuntu-22.04,     rid: windows-arm64,   target: aarch64-pc-windows-msvc, runner: cargo-xwin, deps: xwin,  rust-targets: 'aarch64-pc-windows-msvc',                   optional: true }
    runs-on: ${{ matrix.os }}
    # Optional legs (ARM) must not block the Release when a runner is unavailable.
    continue-on-error: ${{ matrix.optional }}
    steps:
      - name: Checkout tooling (templates)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLS_REPO }}
          path: .qbjs-tools

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project-name }}-web
          path: dist

      - name: Scaffold Tauri project (shared script)
        shell: bash
        run: |
          # Same qbjs-tauri.sh used by `make tauri` locally -- single source of
          # truth for the token substitution (esp. the semver version).
          VER='0.1.0'
          [[ "$GITHUB_REF" == refs/tags/v* ]] && VER="${GITHUB_REF_NAME#v}"
          ARGS=(--dist dist --name "${{ inputs.project-name }}" --version "$VER" --out app)
          [ -n "${{ inputs.tauri-identifier }}" ] && ARGS+=(--id "${{ inputs.tauri-identifier }}")
          chmod +x .qbjs-tools/bin/qbjs-tauri.sh
          QBJS_TEMPLATES=.qbjs-tools/templates .qbjs-tools/bin/qbjs-tauri.sh "${ARGS[@]}"
          cat app/src-tauri/tauri.conf.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri
          key: ${{ matrix.rid }}

      - name: Install Linux webview deps
        if: matrix.deps == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Install Windows cross toolchain (cargo-xwin)
        if: matrix.deps == 'xwin'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm nsis
          cargo install --locked cargo-xwin

      - name: Build
        working-directory: app
        shell: bash
        run: |
          npm install
          npm run tauri icon dist/logo-256.png
          ARGS=""
          [ -n "${{ matrix.runner }}" ] && ARGS="--runner ${{ matrix.runner }}"
          [ -n "${{ matrix.target }}" ] && ARGS="$ARGS --target ${{ matrix.target }}"
          echo "==> tauri build -- $ARGS"
          npm run tauri build -- $ARGS

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p out
          T="${{ matrix.target }}"
          BUNDLE="app/src-tauri/target/${T:+$T/}release/bundle"
          find "$BUNDLE" -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
               -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) \
            -exec cp {} out/ \; || true
          ls -la out

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project-name }}-tauri-${{ matrix.rid }}
          path: out
          if-no-files-found: warn

  # ----------------------------------------------------------------- nwjs ----
  nwjs:
    name: NW.js packages
    needs: web
    if: inputs.build-nwjs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tooling
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLS_REPO }}
          path: .qbjs-tools

      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project-name }}-web
          path: dist

      - name: Package NW.js (all platforms x64 + arm64)
        run: |
          chmod +x .qbjs-tools/bin/qbjs-nwjs.sh
          for combo in "linux x64" "linux arm64" "osx x64" "osx arm64" "win x64" "win arm64"; do
            set -- $combo
            echo "==> NW.js $1/$2"
            QBJS_TEMPLATES=.qbjs-tools/templates \
            .qbjs-tools/bin/qbjs-nwjs.sh \
              --dist dist --name "${{ inputs.project-name }}" \
              --platform "$1" --arch "$2" \
              --nwjs-version "${{ inputs.nwjs-version }}" \
              --out out
          done
          ls -la out

      - name: Upload NW.js artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project-name }}-nwjs
          path: out

  # -------------------------------------------------------------- release ----
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ web, tauri, nwjs ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          # Zip the web bundle for convenient download.
          if [ -d "artifacts/${{ inputs.project-name }}-web" ]; then
            (cd "artifacts/${{ inputs.project-name }}-web" && zip -qr - .) \
              > "release/${{ inputs.project-name }}-web.zip"
          fi
          # Flatten native artifacts.
          find artifacts -type f \
            \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
               -o -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \
               -o -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp {} release/ \; || true
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          append_body: true
          body: |
            ### Install notes

            **macOS** — these builds are ad-hoc signed, not notarized (no paid Apple
            Developer account). On first launch macOS may say the app is from an
            unidentified developer. Either **right-click the app → Open**, or clear the
            download quarantine:
            ```sh
            xattr -cr "/Applications/${{ inputs.project-name }}.app"
            ```
            The `*_universal.dmg` runs on both Intel and Apple Silicon.

            **Windows** — use the `*-setup.exe` (or `.msi`). Windows 11 / updated Win10
            already include WebView2; the installer provisions it otherwise.

            **NW.js** packages are larger but fully self-contained (bundled Chromium).
